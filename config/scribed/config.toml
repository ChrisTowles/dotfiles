[scribed]
hotkey = "ctrl+shift+space"
mode = "toggle"                   # "toggle" or "push-to-talk"
model = "nvidia/parakeet-tdt-0.6b-v2"
input_device = ""                 # empty = system default mic
output_mode = "auto"              # "auto" (ydotool on Wayland, enigo on X11/macOS, clipboard fallback), "injection", "clipboard"
sound_effects = true

# Shift+Enter for intermediate newlines, real Enter only at the end of dictation.
soft_newlines = true

# Audio + silence-gate tuning. Defaults match scribed's clamps; raise
# silence_threshold_dbfs toward 0 if dictation never auto-commits because
# ambient noise is above the gate (run `audio_probe` to see your floor).
chunk_ms = 320
context_seconds = 30.0
silence_threshold_dbfs = -45.0
silence_reset_seconds = 1.5
max_recording_seconds = 300
silence_auto_stop_seconds = 60

# App names (substring match) where the hotkey is ignored.
excluded_apps = []
