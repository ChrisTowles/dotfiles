[scribed]
hotkey = "ctrl+shift+space"
mode = "toggle"                   # "toggle" or "push-to-talk"
input_device = ""                 # empty = system default mic
output_mode = "auto"              # "auto" (ydotool on Wayland, enigo on X11/macOS, clipboard fallback), "injection", "clipboard"
sound_effects = true

# Shift+Enter for intermediate newlines, real Enter only at the end of dictation.
soft_newlines = true

# Audio + silence-gate tuning. silence_threshold_dbfs zero-fills any audio
# chunk whose RMS is below this dBFS before it reaches the recognizer, so
# background noise can't trigger token emission. Lower = more permissive;
# higher = stricter. Typical room ambient is -40 to -50 dBFS; speech at a
# close mic is -15 to -25 dBFS. Raise toward -25 if noise still leaks
# through; lower toward -35 if soft speech is being clipped.
chunk_ms = 120
silence_threshold_dbfs = -36.0
max_recording_seconds = 300
silence_auto_stop_seconds = 60

# App names (substring match) where the hotkey is ignored.
excluded_apps = []
