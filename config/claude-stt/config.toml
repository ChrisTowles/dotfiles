[claude-stt]
hotkey = "cmd+d"
# Second hotkey that records + fixes grammar/punctuation via Claude CLI
improve_hotkey = "ctrl+shift+space"
improve_model = "haiku"          # Claude model for text improvement


mode = "toggle"                  # "toggle" or "push-to-talk"
engine = "whisper"               # "whisper" or "moonshine"
# moonshine_model = "moonshine/base"
whisper_model = "medium"
sample_rate = 16000
max_recording_seconds = 300      # max 600
audio_device = "Jabra Evolve2 40 SE"
output_mode = "injection"             # "auto", "injection", or "clipboard"
sound_effects = true



# Use Shift+Enter for newlines instead of Enter (only the final
# trailing newline becomes a real Enter)
soft_newlines = true

# Language for transcription ("auto" = auto-detect, or ISO 639-1 code)
language = "en"
