[claude-stt]
hotkey = "ctrl+shift+space"
mode = "toggle"                  # "toggle" or "push-to-talk"
ws_port = 18333
max_recording_seconds = 300      # max 600
output_mode = "injection"        # "auto", "injection", or "clipboard"
sound_effects = true

# Use Shift+Enter for newlines instead of Enter (only the final
# trailing newline becomes a real Enter)
soft_newlines = true
