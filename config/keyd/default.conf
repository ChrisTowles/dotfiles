# =============================================================================
# keyd configuration — Linux system-wide key remapping
# Deployed to /etc/keyd/default.conf by functions/79-popos.sh
# =============================================================================
#
# keyd is a system-level key remapping daemon that intercepts evdev input
# before it reaches X11/Wayland. This config is the Linux equivalent of
# the Karabiner-Elements config at config/karabiner/karabiner.json.
#
# See: https://github.com/rvaiya/keyd
# Docs: man keyd (after install)
#
# ─── What this does ──────────────────────────────────────────────────────────
#
# Swaps left Ctrl and left Super (Meta/Win) so the physical keyboard layout
# matches macOS with Karabiner's simple_modifications applied:
#
#   Karabiner (macOS):            keyd (Linux):
#     left_command → left_control   leftmeta    → leftcontrol
#     left_control → left_command   leftcontrol → leftmeta
#
# ─── Physical key positions (before/after) ───────────────────────────────────
#
#   Standard PC keyboard:
#     [Ctrl]  [Super]  [Alt]  [────── Space ──────]  [Alt]  [Super]  [Ctrl]
#
#   After this config:
#     [Super] [Ctrl]   [Alt]  [────── Space ──────]  [Alt]  [Super]  [Ctrl]
#       ↑        ↑
#     swapped  swapped
#
#   Only the LEFT side is swapped. Right side stays as-is.
#
# ─── Why? ────────────────────────────────────────────────────────────────────
#
# On macOS, Cmd (next to spacebar) is the primary modifier for shortcuts:
#   Cmd+C = copy, Cmd+V = paste, Cmd+T = new tab, Cmd+W = close tab, etc.
#
# On Linux, Ctrl is the primary modifier:
#   Ctrl+C = copy, Ctrl+V = paste, Ctrl+T = new tab, Ctrl+W = close tab, etc.
#
# By swapping left Ctrl and left Super, the key NEXT TO THE SPACEBAR becomes
# Ctrl on Linux — the same physical position as Cmd on macOS. Muscle memory
# transfers perfectly between OSes.
#
# ─── Why no complex rules? ──────────────────────────────────────────────────
#
# The macOS Karabiner config has ~37 "PC-Style" complex modification rules:
#   - Home/End → Cmd+Left/Right (line boundaries)
#   - Ctrl+C/V/X → Cmd+C/V/X (clipboard)
#   - Alt+Tab → Cmd+Tab (app switching)
#   - Ctrl+arrows → word navigation
#   - PrintScreen → screenshot
#   - Alt+F4 → Cmd+Q
#   ... and more
#
# NONE of these are needed on Linux because Linux already has PC-native
# behavior. Those rules only exist to make macOS act like a PC. On Linux,
# Home/End, Ctrl+C/V/X, Alt+Tab, etc. all work natively. The only thing
# we need is the physical key position swap.
#
# ─── Troubleshooting ────────────────────────────────────────────────────────
#
#   Check daemon status:   sudo systemctl status keyd
#   Monitor live input:    sudo keyd monitor
#   Reload after editing:  sudo systemctl restart keyd
#   Revert to defaults:    sudo rm /etc/keyd/default.conf && sudo systemctl restart keyd
#
# =============================================================================

[ids]

# Apply to all keyboards
*

[main]

# Swap left Ctrl ↔ left Super (Meta/Win key)
#leftcontrol = leftmeta
#leftmeta = leftcontrol
