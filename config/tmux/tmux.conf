# Remap prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Pass through extended key sequences (Shift+Enter, etc.) for Ghostty/kitty protocol
set -g extended-keys on
set -as terminal-features ",xterm-256color:extkeys"

# Use Homebrew bash for plugin scripts (macOS /bin/bash is 3.2, lacks associative arrays)
if-shell '[ -x /opt/homebrew/bin/bash ]' {
  set-environment -g PATH "/opt/homebrew/bin:$PATH"
}

# Enable mouse support
set -g mouse on

# Disable tmux right-click menu (broken in Ghostty — upstream bug with stuck mouse button state)
# https://github.com/ghostty-org/ghostty/discussions/5362
unbind -n MouseDown3Pane

# Intuitive splits (| or \ for vertical, - for horizontal)
bind | split-window -h
bind \\ split-window -h

bind - split-window -v
bind _ split-window -v 

unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Auto-renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Plugins (via TPM)
set -g @plugin 'tmux-plugins/tpm'


# https://github.com/janoamaral/tokyo-night-tmux
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format YMD
set -g @tokyo-night-tmux_time_format 12H
set -g @tokyo-night-tmux_theme storm 
# path
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'
#
set -g @tokyo-night-tmux_show_wbg 1


# Initialize TPM (keep at bottom)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'


# agentboard
run-shell 'tt agentboard init'

run '~/.config/tmux/plugins/tpm/tpm'
